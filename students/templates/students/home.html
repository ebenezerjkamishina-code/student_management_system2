<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(135deg, #ffb86b 0%, #ff6b9d 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        /* Top left small buttons */
        .top-nav {
            position: absolute;
            top: 20px;
            left: 30px;
            display: flex;
            gap: 12px;
        }

        .btn-sm {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            color: #fff;
            padding: 10px 18px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .btn-sm:hover {
            background: #fff;
            color: #ff4f7c;
            transform: translateY(-2px);
        }

        /* Center container */
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        p.subtitle {
            font-size: 1.1rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background: #fff;
            color: #ff4f7c;
            padding: 16px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: 2px solid #fff;
            min-width: 160px;
        }

        .btn:hover {
            background: transparent;
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn.dark {
            background: rgba(0,0,0,0.3);
            color: #fff;
        }

        .btn.dark:hover {
            background: #fff;
            color: #ff4f7c;
        }

        @media(max-width: 700px) {
            h1 { font-size: 2rem; }
            .btn-group { flex-direction: column; }
            .top-nav { position: static; justify-content: center; margin-bottom: 20px; }
            .container { position: static; transform: none; margin: 0 auto; }
        }
    </style>
</head>
<body>
    <!-- Top Left Small Buttons -->
    <div class="top-nav">
        <a href="{% url 'resources' %}" class="btn-sm">Resources</a>
        <a href="{% url 'elearning' %}" class="btn-sm">E-Learning</a>
        <a href="{% url 'assignments' %}" class="btn-sm">Assignments</a>
    </div>

    <!-- Center Big Buttons -->
    <div class="container">
        <h1>Student Management System</h1>
        <p class="subtitle">Access your academic resources in one place</p>
        
        <div class="btn-group">
            <a href="{% url 'courses' %}" class="btn">Courses</a>
            <a href="{% url 'results' %}" class="btn dark">Results</a>
            <a href="{% url 'past_papers' %}" class="btn">Past Papers</a>
        </div>
    </div>
</body>
</html>
