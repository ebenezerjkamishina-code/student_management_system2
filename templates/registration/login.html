

<!DOCTYPE html>
<html>
<head>
<title>Login - Student Management System</title>
<style>
body{background:linear-gradient(135deg, #ffb86b 0%, #ff6b9d 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Segoe UI';}
.card{background:rgba(255,255,255,0.15); backdrop-filter:blur(10px); padding:40px; border-radius:20px; width:380px; color:#fff;}
input{width:100%; padding:12px; margin:10px 0; border-radius:10px; border:none;}
button{width:100%; padding:12px; border:none; border-radius:50px; background:#fff; color:#ff4f7c; font-weight:600; cursor:pointer;}
a{color:#fff;}
</style>
</head>
<body>
<div class="card">
<h2>Login</h2>
<form method="post"autocomplete = "off"> {% csrf_token %} {{ form.as_p }} <button>Login</button> </form>
<p>No account? <a href="{% url 'register' %}">Register</a></p>
</div>
</body>
</html>
